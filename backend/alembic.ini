# Alembic 配置文件

[alembic]
# 迁移脚本目录
script_location = alembic

# 数据库 URL（在 env.py 中动态设置）
# sqlalchemy.url = driver://user:pass@localhost/dbname

# 迁移文件模板
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# 时区
timezone = Asia/Shanghai

# 输出编码
output_encoding = utf-8

[post_write_hooks]

# 日志配置
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
